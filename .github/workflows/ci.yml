name: ci
on: [push, pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Skill-count consistency
        run: python3 scripts/lint-skill-counts.py
      - name: Tool-count consistency
        run: python3 scripts/lint-tool-counts.py
      - name: Version banners match plugin.json
        run: python3 scripts/lint-versions.py
      - name: Doc-correctness gate
        run: python3 scripts/check_docs.py
      - name: De-slop the README
        run: |
          pip install --quiet "git+https://github.com/cfregly/claude-deslop"
          python -m deslop README.md
