# Pre-commit hooks for profile-and-optimize contributors (v0.6.4+).
#
# Local setup:
#   cd plugins/profile-and-optimize/server && pip install -e ".[dev]"
#   pre-commit install
#
# Then `git commit` runs the hooks below on staged files; `pre-commit run
# --all-files` runs them on the whole tree.
#
# Why the ruff hooks are filtered to 5 profile-and-optimize-native subtrees: the
# vendored MLPerf code under plugins/profile-and-optimize/server/{launcher,selector,
# validator,contention,leaderboard,preflight,ai_tuning,submission,campaign,
# profile,tools/...} has its own upstream style + we accept it as-is to
# avoid cherry-pick conflicts on the optional sync from
# the upstream MLPerf-training mirror.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Pre-commit complains on multi-document YAML by default; the dbt /
        # ARM manifests use ---/--- separators. Allow them.
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: '^plugins/profile-and-optimize/server/(perf_baseline|evidence|slurm|cohort_health|experiments|tools/(perf_baseline|evidence|slurm|cohort_health|experiments))/'
      - id: ruff-format
        files: '^plugins/profile-and-optimize/server/(perf_baseline|evidence|slurm|cohort_health|experiments|tools/(perf_baseline|evidence|slurm|cohort_health|experiments))/'

  - repo: local
    hooks:
      - id: check-doc-links-no-network
        name: check-doc-links (no-network)
        entry: bash scripts/check-doc-links.sh --no-network --quiet
        language: system
        pass_filenames: false
        files: '\.md$'
      - id: lint-skill-mcp-args
        name: lint-skill-mcp-args (descriptor cross-check; v0.8.2+)
        entry: python3 scripts/lint-skill-mcp-args.py
        language: system
        pass_filenames: false
        files: '^plugins/profile-and-optimize/skills/.*/SKILL\.md$'
      - id: lint-skill-counts
        # Catches the v1.13.0 class of bug: doc says "21 skills" but the
        # on-disk plugins/profile-and-optimize/skills/ tree has 44. Added in v1.14.0.
        name: lint-skill-counts (single source of truth for skill totals)
        entry: python3 scripts/lint-skill-counts.py
        language: system
        pass_filenames: false
        files: '(^plugins/profile-and-optimize/skills/|^README\.md$|^CATALOG\.md$|^CONTRIBUTING\.md$|^REVIEWERS\.md$|^SECURITY\.md$|^Makefile$|^plugins/profile-and-optimize/README\.md$|^plugins/profile-and-optimize/\.claude-plugin/plugin\.json$|^\.claude-plugin/marketplace\.json$)'
      - id: lint-tool-counts
        # Catches the v1.13.0 class of bug: doc says "75-tool surface" but
        # mcp_surface.py exposes 97 (95 contract + 2 aux). Added in v1.14.0.
        name: lint-tool-counts (single source of truth for MCP tool / library totals)
        entry: python3 scripts/lint-tool-counts.py
        language: system
        pass_filenames: false
        files: '(^plugins/profile-and-optimize/server/(mcp_surface\.py|README\.md|AGENTS\.md|docs/|tools/profile_and_optimize_mcp/README\.md)|^README\.md$|^CATALOG\.md$|^CONTRIBUTING\.md$|^REVIEWERS\.md$|^SECURITY\.md$|^Makefile$|^plugins/profile-and-optimize/README\.md$|^plugins/profile-and-optimize/\.claude-plugin/plugin\.json$)'
      - id: lint-release-tag
        # Tagging rigidity (v1.32.0+): a plugin.json version with no matching
        # vX.Y.Z tag blocks the push. pre-push stage; enable once with
        # `pre-commit install --hook-type pre-push`.
        name: lint-release-tag (tagging rigidity; pre-push)
        entry: bash scripts/check-release-tag.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
