# Speed-of-Light (SoL) ceiling reference — workspace-shared
#
# Single source of truth for B200 / GB300 / H100 published peaks used by the
# perf-report renderer (renderer/sol_roofline.py), per-run sol-summary.md docs,
# and the measurement-producing skills under
# plugins/profile-and-optimize/skills/. CLAUDE.md "Speed-of-light framing"
# section is the methodology entry point.
#
# Schema (per entry):
#   <metric>:
#     value:  <float|bool>
#     units:  <string>   # e.g. "PFLOPS", "TB/s", "GB/s"
#     source: <string>   # datasheet / GTC brief / vendor whitepaper citation
#     notes:  <string>   # optional caveats (sparse vs dense, bi-dir vs uni-dir, etc.)
#
# Hardware keys use the form <chip>_<variant> (e.g. b200_sm100, gb300_nvl72).
# Never inline these numbers in skills, summary docs, or the renderer — always
# load this YAML and reference by key path so the source-of-truth stays single.

b200_sm100:
  hw_name: "NVIDIA B200 (Blackwell SM100, single-GPU)"
  nvfp4_dense_pflops:
    value: 9.0
    units: PFLOPS
    source: "NVIDIA Blackwell GTC 2024 product brief; B200 datasheet"
    notes: "Dense NVFP4 Tensor Core. Sparse ~18 PFLOPS (2:4 structured)."
    dcgm_metric: "DCGM_FI_PROF_PIPE_TENSOR_ACTIVE"
    dcgm_unit: "ratio"  # 0..1 fraction of cycles tensor pipe was active; integrate*peak = TFLOPS
  fp8_dense_pflops:
    value: 4.5
    units: PFLOPS
    source: "B200 datasheet"
    notes: "Dense FP8 Tensor Core. ~2.3x H100 SXM."
    dcgm_metric: "DCGM_FI_PROF_PIPE_TENSOR_ACTIVE"
    dcgm_unit: "ratio"
  bf16_dense_pflops:
    value: 2.25
    units: PFLOPS
    source: "B200 datasheet"
    notes: "Dense BF16/FP16 Tensor Core."
    dcgm_metric: "DCGM_FI_PROF_PIPE_FP16_ACTIVE"
    dcgm_unit: "ratio"
  fp32_tc_tflops:
    value: 625
    units: TFLOPS
    source: "B200 datasheet"
    notes: "Tensor Core FP32 (TF32). Non-TC FP32 is much lower."
    dcgm_metric: "DCGM_FI_PROF_PIPE_FP32_ACTIVE"
    dcgm_unit: "ratio"
  hbm3e_tbps:
    value: 8.0
    units: TB/s
    source: "B200 datasheet (192 GB HBM3e)"
    notes: "Per-GPU HBM3e bandwidth. 2.4x H100 SXM."
    dcgm_metric: "DCGM_FI_PROF_DRAM_ACTIVE"
    dcgm_unit: "ratio"  # integrate*peak_BW*duration = bytes_transferred
    dcgm_fallback_metric: "DCGM_FI_DEV_FB_USED"
    dcgm_fallback_notes: "Counter-only fallback when DCGM_FI_PROF group not exported; coarser but always available."
  hbm3e_capacity_gb:
    value: 192
    units: GB
    source: "B200 datasheet"
    notes: "Live deploys observe ~183 GiB available (reserved overhead)."
    dcgm_metric: "DCGM_FI_DEV_FB_USED"
    dcgm_unit: "bytes"  # current allocation, not bandwidth
  nvlink5_tbps:
    value: 1.8
    units: TB/s
    source: "NVLink5 spec, bi-directional aggregate per GPU"
    notes: "2.0x NVLink4 (H100). Uni-directional ~0.9 TB/s each way."
    dcgm_metrics_bytes:
      - "DCGM_FI_PROF_NVLINK_TX_BYTES"
      - "DCGM_FI_PROF_NVLINK_RX_BYTES"
    dcgm_unit: "bytes_per_scrape"  # counter increment per scrape; sum / window_duration = aggregate BW
    dcgm_fallback_metric: "DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL"
    dcgm_fallback_notes: "Counter-only fallback aggregates TX+RX automatically; less granular but device-counter-tier (always available)."
  nvswitch_sharp:
    value: true
    source: "NVSwitch5 spec"
    notes: "In-network reductions; SHARP-aware NCCL recovers measurable AR latency."
  pcie_gen5_x16_gbps:
    value: 128
    units: GB/s
    source: "PCIe 5.0 x16 spec"
    notes: "Host<->GPU. Same as H100."
    dcgm_metrics_bytes:
      - "DCGM_FI_PROF_PCIE_TX_BYTES"
      - "DCGM_FI_PROF_PCIE_RX_BYTES"
    dcgm_unit: "bytes_per_scrape"

gb300_nvl72:
  hw_name: "NVIDIA GB300 (Blackwell Ultra, NVL72 rack-scale)"
  nvfp4_dense_pflops:
    value: 15.0
    units: PFLOPS
    source: "NVIDIA Blackwell Ultra GTC 2025 brief"
    notes: "Per-GPU NVFP4 dense. Rack peak = 72 x value."
    dcgm_metric: "DCGM_FI_PROF_PIPE_TENSOR_ACTIVE"
    dcgm_unit: "ratio"
  fp8_dense_pflops:
    value: 7.5
    units: PFLOPS
    source: "GB300 datasheet"
    notes: "Per-GPU FP8 dense."
    dcgm_metric: "DCGM_FI_PROF_PIPE_TENSOR_ACTIVE"
    dcgm_unit: "ratio"
  bf16_dense_pflops:
    value: 3.75
    units: PFLOPS
    source: "GB300 datasheet"
    notes: "Per-GPU BF16/FP16 dense."
    dcgm_metric: "DCGM_FI_PROF_PIPE_FP16_ACTIVE"
    dcgm_unit: "ratio"
  hbm3e_tbps:
    value: 8.0
    units: TB/s
    source: "GB300 datasheet"
    notes: "Per-GPU HBM3e bandwidth (same as B200; capacity increases to 288 GB)."
    dcgm_metric: "DCGM_FI_PROF_DRAM_ACTIVE"
    dcgm_unit: "ratio"
    dcgm_fallback_metric: "DCGM_FI_DEV_FB_USED"
  hbm3e_capacity_gb:
    value: 288
    units: GB
    source: "GB300 datasheet"
    notes: "1.5x B200 capacity."
  nvlink5_tbps:
    value: 1.8
    units: TB/s
    source: "NVLink5 spec, bi-directional aggregate per GPU"
    notes: "Same per-GPU NVL5 BW as B200; NVL72 domain extends NVLink to 72 GPUs."
    dcgm_metrics_bytes:
      - "DCGM_FI_PROF_NVLINK_TX_BYTES"
      - "DCGM_FI_PROF_NVLINK_RX_BYTES"
    dcgm_unit: "bytes_per_scrape"
    dcgm_fallback_metric: "DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL"
  nvswitch_sharp:
    value: true
    source: "NVSwitch5 in NVL72"
    notes: "72-way NVLink domain; NCCL NVLS path expected."
  roce_per_nic_gbps:
    value: 400
    units: GB/s
    source: "ConnectX-8 / SuperNIC 800G spec"
    notes: "GB300 RoCE backend (not InfiniBand). Per-NIC 400 GbE x2 = 800 GbE = 100 GB/s practical."

h100_sxm:
  hw_name: "NVIDIA H100 SXM (Hopper, reference column)"
  fp8_dense_pflops:
    value: 1.98
    units: PFLOPS
    source: "H100 datasheet"
    notes: "Reference for B200/GB300 scaling claims."
  bf16_dense_pflops:
    value: 0.99
    units: PFLOPS
    source: "H100 datasheet"
  hbm3_tbps:
    value: 3.35
    units: TB/s
    source: "H100 SXM datasheet (80 GB HBM3)"
  nvlink4_tbps:
    value: 0.9
    units: TB/s
    source: "NVLink4 spec, bi-directional aggregate per GPU"
  nvswitch_sharp:
    value: false
    source: "NVSwitch3 — no SHARP"
    notes: "B200/GB300 net-new capability."

# ---------------------------------------------------------------------------
# Category -> ceiling mapping
#
# Zymtrace per-category buckets (from importers/zymtrace_kernels.py +
# renderer/kernel_breakdown.py CATEGORY_DISPLAY_ORDER) map to the natural
# ceiling each kernel family is bound by. The renderer's sol_roofline.py
# reads this mapping to compute "% of SoL" per category from the time-share.
#
# Caveat: zymtrace samples are time-share, not byte-traffic. %SoL computed
# this way is an upper-bound proxy, not a tight measurement -- it is RECORDED
# as sol_rigor=L1 (a valid, published, comparable roofline), not withheld;
# adding DCGM (L3) or ncu (L4) raises the rigor. See CLAUDE.md "Speed-of-light
# framing" for the full caveat + the always-publish-with-focus policy.
category_ceiling_map:
  NCCL:         { metric: nvlink5_tbps,         bound: bandwidth }
  MoE:          { metric: nvfp4_dense_pflops,   bound: compute }
  FMHA:         { metric: hbm3e_tbps,           bound: bandwidth }
  BMM-NVFP4:    { metric: nvfp4_dense_pflops,   bound: compute }
  Triton-fused: { metric: bf16_dense_pflops,    bound: compute }
  cuBLAS:       { metric: bf16_dense_pflops,    bound: compute }
  Elementwise:  { metric: hbm3e_tbps,           bound: bandwidth }
  Other:        { metric: hbm3e_tbps,           bound: bandwidth }

# ---------------------------------------------------------------------------
# DCGM exporter integration (Phase 2 of SoL framing)
#
# The dcgm_correlate.py tool reads this block to know:
#   - Which Prometheus metric names to query for each peak's DCGM-side proxy
#   - Which counters integrate to bytes (rate counters) vs report ratios
#   - Which counter-only fallbacks to use if the PROF group isn't exported
#
# The Prometheus datasource is the canonical query target.
# Per the workspace prometheus-anchored-query pattern, dcgm_correlate.py
# calls query_observability_knowledge_base FIRST to confirm cardinality
# before issuing the PromQL.
dcgm_config:
  # Default labels to filter on; operators override per-cluster.
  # GPU label is required to align with per-cell ncu data.
  default_labels:
    - "gpu"
    - "device"
    - "hostname"
    - "namespace"
    - "pod"
  # Minimum sweep duration in seconds for a reliable DCGM correlation.
  # DCGM exporter typically scrapes every 10-30s; sweeps shorter than 3
  # scrape intervals are unreliable.
  min_sweep_seconds: 60
  # Recommended scrape interval (s). If the cluster's scrape is slower
  # than this the correlation is still produced but flagged as coarse.
  expected_scrape_interval_s: 15
  # Discovery for whether the DCGM_FI_PROF_* group is exported. If
  # query_observability_knowledge_base returns zero matches for these,
  # the correlator falls back to DCGM_FI_DEV_* counter-only metrics.
  prof_group_probe_metrics:
    - "DCGM_FI_PROF_DRAM_ACTIVE"
    - "DCGM_FI_PROF_PIPE_TENSOR_ACTIVE"
